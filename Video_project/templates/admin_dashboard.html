{% extends "base.html" %}
{% block title %}Admin Dashboard{% endblock %}

{% block content %}

<h1 style="margin-bottom: 5px;">Admin Dashboard</h1>
<p style="color: gray; margin-top: 0; margin-bottom: 20px;">
  Manage users, requests, and system actions.
</p>

<div class="card" style="margin-top: 20px;">
  <h3 style="margin-top: 0; margin-bottom: 15px;">Quick Actions</h3>

  <div style="
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
  ">
    <a href="{{ url_for('new_request') }}" style="text-decoration: none;">
      <button type="button" style="width: 100%; height: 60px; background: #041981; color: white;">
        New Request
      </button>
    </a>

    <a href="{{ url_for('director_dashboard') }}" style="text-decoration: none;">
      <button type="button" style="width: 100%; height: 60px; background: #041981; color: white;">
        Manage Requests
      </button>
    </a>

    <a href="{{ url_for('all_users') }}" style="text-decoration: none;">
      <button type="button" style="width: 100%; height: 60px; background: #041981; color: white;">
        View All Users
      </button>
    </a>

    <a href="{{ url_for('create_account', role='director') }}" style="text-decoration: none;">
      <button type="button" style="width: 100%; height: 60px; background: #041981; color: white;">
        Create Director Account
      </button>
    </a>

    <a href="{{ url_for('create_account', role='tech') }}" style="text-decoration: none;">
      <button type="button" style="width: 100%; height: 60px; background: #041981; color: white;">
        Create Tech Account
      </button>
    </a>
  </div>
</div>

{% endblock %}
